services:
  redis:
    image: redis:8.4
    container_name: zhitu-agent-redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: zhitu-agent-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-plugins:/usr/share/elasticsearch/plugins
    command: >
      bash -c "
      if [ ! -d /usr/share/elasticsearch/plugins/analysis-ik ]; then
        echo 'Installing IK analyzer plugin...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      fi;
      exec /usr/local/bin/docker-entrypoint.sh elasticsearch"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: zhitu-agent-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-zhituagent}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-zhituagent12345}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  es-data:
  es-plugins:
  minio-data:
