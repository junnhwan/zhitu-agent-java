spring:
  application:
    name: zhitu-agent-java
  config:
    import: optional:file:.env[.properties]
  data:
    redis:
      host: ${ZHITU_REDIS_HOST:localhost}
      port: ${ZHITU_REDIS_PORT:6379}
      password: ${ZHITU_REDIS_PASSWORD:}
      database: ${ZHITU_REDIS_DATABASE:0}

server:
  port: 8080

zhitu:
  app:
    system-prompt-location: classpath:system-prompt/chat-agent.txt
    multi-agent-enabled: ${ZHITU_MULTI_AGENT_ENABLED:true}
  llm:
    mock-mode: ${ZHITU_LLM_MOCK_MODE:true}
    base-url: ${ZHITU_CHAT_BASE_URL:}
    api-key: ${ZHITU_CHAT_API_KEY:}
    model-name: ${ZHITU_CHAT_MODEL_NAME:mock-agent}
  embedding:
    base-url: ${ZHITU_EMBEDDING_URL:}
    api-key: ${ZHITU_EMBEDDING_API_KEY:}
    model-name: ${ZHITU_EMBEDDING_MODEL_NAME:}
    dimensions: ${ZHITU_EMBEDDING_DIMENSIONS:0}
  rerank:
    enabled: ${ZHITU_RERANK_ENABLED:true}
    url: ${ZHITU_RERANK_URL:}
    api-key: ${ZHITU_RERANK_API_KEY:}
    model-name: ${ZHITU_RERANK_MODEL_NAME:}
    recall-top-k: ${ZHITU_RERANK_RECALL_TOP_K:20}
    final-top-k: ${ZHITU_RERANK_FINAL_TOP_K:5}
    timeout-millis: ${ZHITU_RERANK_TIMEOUT_MILLIS:60000}
  rag:
    hybrid-enabled: ${ZHITU_RAG_HYBRID_ENABLED:true}
    lexical-top-k: ${ZHITU_RAG_LEXICAL_TOP_K:10}
    min-accepted-score: ${ZHITU_RAG_MIN_ACCEPTED_SCORE:0.15}
  elasticsearch:
    host: ${ZHITU_ES_HOST:localhost}
    port: ${ZHITU_ES_PORT:9200}
    scheme: ${ZHITU_ES_SCHEME:http}
    username: ${ZHITU_ES_USERNAME:}
    password: ${ZHITU_ES_PASSWORD:}
    index-name: ${ZHITU_ES_INDEX_NAME:zhitu_agent_knowledge}
    vector-dim: ${ZHITU_ES_VECTOR_DIM:4096}
  infrastructure:
    redis-enabled: ${ZHITU_REDIS_ENABLED:false}
    elasticsearch-enabled: ${ZHITU_ES_ENABLED:false}
  trace-archive:
    enabled: ${ZHITU_TRACE_ARCHIVE_ENABLED:true}
    dir: ${ZHITU_TRACE_ARCHIVE_DIR:logs/trace}
    file-prefix: ${ZHITU_TRACE_ARCHIVE_FILE_PREFIX:zhitu-agent-trace}

management:
  defaults:
    metrics:
      export:
        enabled: true
  endpoints:
    access:
      default: read-only
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      access: read-only
  health:
    redis:
      enabled: ${ZHITU_REDIS_ENABLED:false}
    elasticsearch:
      enabled: ${ZHITU_ES_ENABLED:false}
  prometheus:
    metrics:
      export:
        enabled: true
